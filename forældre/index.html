<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flango Forældre-portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary-color: #ff7a3c;
      --primary-color-soft: rgba(255, 122, 60, 0.12);
      --secondary-color: #3c7dff;
      --secondary-soft: rgba(60, 125, 255, 0.12);
      --accent-color: #ffc857;
      --background-gradient: radial-gradient(circle at top left, #ffe1c7 0, #f5f7ff 40%, #dfe8ff 100%);
      --card-bg: rgba(255, 255, 255, 0.88);
      --border-soft: rgba(255, 255, 255, 0.6);
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.18);
      --success-color: #28a745;
      --danger-color: #dc3545;
      --warning-color: #ffb100;
      --font-body: 'Nunito', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-heading: 'Baloo 2', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
      font-family: var(--font-body);
      background: var(--background-gradient);
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: var(--card-bg);
      border-radius: 26px;
      padding: 28px 22px 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    /* Dekorative "chips" i hjørnerne */
    .container::before,
    .container::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(20px);
      opacity: 0.5;
      pointer-events: none;
    }

    .container::before {
      width: 170px;
      height: 170px;
      background: var(--primary-color-soft);
      top: -60px;
      right: -40px;
    }

    .container::after {
      width: 190px;
      height: 190px;
      background: var(--secondary-soft);
      bottom: -80px;
      left: -50px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 30px;
      text-align: center;
      margin: 0 0 4px;
      color: #222;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #5f6475;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .pill-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
    }

    /* Layout */
    #login-view,
    #results-view {
      position: relative;
      z-index: 1;
    }

    .login-card {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      padding: 18px 16px 16px;
      border: 1px solid rgba(226, 232, 240, 0.9);
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: 20px;
      margin: 4px 0 10px;
      color: #1f2933;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title span.icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--primary-color-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .login-form input,
    .login-form button {
      width: 100%;
      padding: 13px 14px;
      font-size: 16px;
      border-radius: 12px;
      margin-top: 10px;
      font-family: var(--font-body);
      border: 1px solid #d6d9e0;
    }

    .login-form input {
      background: rgba(248, 250, 252, 0.9);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .login-form input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.6);
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3);
    }

    .login-form button {
      background: linear-gradient(135deg, #ff7a3c, #ff4b73);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-top: 14px;
      box-shadow: 0 11px 20px rgba(248, 113, 113, 0.33);
      transform: translateY(0);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    .login-form button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(248, 113, 113, 0.4);
      filter: brightness(1.03);
    }

    .login-form button:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(248, 113, 113, 0.35);
    }

    .login-form button:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: default;
      transform: none;
    }

    .error-message {
      color: var(--danger-color);
      text-align: center;
      margin-top: 12px;
      font-weight: 600;
      font-size: 14px;
    }

    /* Results layout */
    #results-view {
      display: none;
      margin-top: 8px;
    }

    .top-row {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      gap: 14px;
      align-items: stretch;
    }

    .balance-card {
      background: radial-gradient(circle at top left, #ffb199, #ff7a3c);
      color: #fff;
      border-radius: 20px;
      padding: 16px 16px 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 30px rgba(251, 113, 133, 0.45);
    }

    .balance-card::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 130px;
      height: 130px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.55), transparent 60%);
      opacity: 0.55;
    }

    .balance-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      opacity: 0.9;
    }

    #child-name-display {
      font-family: var(--font-heading);
      font-size: 22px;
      margin: 4px 0 14px;
    }

    .balance-amount-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    #balance-display {
      font-size: 30px;
      font-weight: 800;
    }

    .balance-chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(15, 23, 42, 0.16);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .balance-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #22c55e;
    }

    .balance-dot.low {
      background: #facc15;
    }

    .balance-dot.negative {
      background: #ef4444;
    }

    .history-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      padding: 14px 14px 12px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      max-height: 260px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .history-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .history-title {
      font-family: var(--font-heading);
      font-size: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
      color: #111827;
    }

    .history-title span.icon {
      background: var(--secondary-soft);
      border-radius: 999px;
      width: 20px;
      height: 20px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .history-sub {
      font-size: 11px;
      color: #6b7280;
    }

    .history-scroll {
      margin-top: 6px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 2px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
      font-size: 14px;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-description-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #111827;
    }

    .history-pill {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .history-pill.SALE {
      background: #f97316;
    }

    .history-pill.DEPOSIT {
      background: #22c55e;
    }

    .history-pill.BALANCE_EDIT {
      background: #6366f1;
    }

    .history-date {
      font-size: 11px;
      color: #6b7280;
    }

    .history-amount {
      white-space: nowrap;
      font-weight: 700;
      font-size: 14px;
      align-self: center;
    }

    .history-amount.sale {
      color: var(--danger-color);
    }

    .history-amount.deposit {
      color: var(--success-color);
    }

    .notification-card {
      margin-top: 14px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      padding: 14px 14px 16px;
      border: 1px solid rgba(226, 232, 240, 0.9);
    }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .notification-header h2 {
      font-family: var(--font-heading);
      font-size: 18px;
      margin: 0;
      color: #111827;
      text-align: left;
    }

    .notification-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.08);
      color: #2563eb;
      border: 1px solid rgba(191, 219, 254, 0.9);
    }

    .form-group {
      margin-bottom: 10px;
    }

    .notification-label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      font-size: 13px;
      color: #374151;
    }

    #parent-email-input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #d4d4dd;
      background: #f9fafb;
      font-size: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    #parent-email-input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.6);
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    #save-notify-btn {
      margin-top: 8px;
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #3c7dff, #5c9bff);
      color: white;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 9px 20px rgba(37, 99, 235, 0.38);
      transform: translateY(0);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    #save-notify-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(37, 99, 235, 0.45);
      filter: brightness(1.04);
    }

    #save-notify-btn:active {
      transform: translateY(0);
      box-shadow: 0 7px 16px rgba(37, 99, 235, 0.4);
    }

    #notify-feedback {
      text-align: center;
      margin-top: 8px;
      font-weight: 600;
      font-size: 13px;
      min-height: 18px;
    }

    #logout-btn {
      margin-top: 18px;
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.9);
      color: white;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.45);
    }

    #logout-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 15px 26px rgba(15, 23, 42, 0.55);
      filter: brightness(1.02);
    }

    #logout-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.5);
    }

    @media (max-width: 720px) {
      .container {
        padding: 22px 16px 18px;
        border-radius: 22px;
      }
      .top-row {
        grid-template-columns: minmax(0, 1fr);
      }
      .history-card {
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Flango Forældre-portal</h1>
    <p class="subtitle">
      <span class="pill-tag">
        <span class="pill-dot"></span>
        Live overblik over saldo & historik
      </span>
    </p>

    <!-- Login View -->
    <div id="login-view">
      <div class="login-card">
        <div class="section-title">
          <span class="icon">👨‍👩‍👧</span>
          Log ind som forælder
        </div>
        <form id="parent-login-form" class="login-form">
          <input
            type="text"
            id="child-name-input"
            placeholder="Barnets fornavn (eller fulde navn)"
            required
          />
          <input
            type="password"
            id="parent-pin-input"
            placeholder="6-cifret forældre-PIN"
            inputmode="numeric"
            maxlength="6"
            required
          />
          <button type="submit" id="login-btn">Se saldo og historik</button>
          <p id="login-error" class="error-message" style="display: none;"></p>
        </form>
      </div>
    </div>

    <!-- Results View -->
    <div id="results-view">
      <div class="top-row">
        <!-- Balance Card -->
        <div class="balance-card">
          <div class="balance-label">Saldo på kontoen</div>
          <div id="child-name-display"></div>
          <div class="balance-amount-row">
            <div id="balance-display"></div>
            <div class="balance-chip">
              <span id="balance-dot" class="balance-dot"></span>
              <span id="balance-status-label">OK saldo</span>
            </div>
          </div>
        </div>

        <!-- History Card -->
        <div class="history-card">
          <div class="history-header-row">
            <div>
              <div class="history-title">
                <span class="icon">🧾</span>
                Historik
              </div>
              <div class="history-sub">Seneste køb, indbetalinger og ændringer</div>
            </div>
          </div>
          <div class="history-scroll">
            <ul id="history-list" class="history-list"></ul>
          </div>
        </div>
      </div>

      <!-- Notification Settings -->
      <div class="notification-card">
        <div class="notification-header">
          <h2>E-mail-beskeder</h2>
          <span class="notification-tag">Valgfrit</span>
        </div>
        <div class="form-group">
          <label for="parent-email-input" class="notification-label">Din e-mailadresse</label>
          <input
            type="email"
            id="parent-email-input"
            placeholder="indtast@din-email.dk"
          />
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="notify-zero-checkbox" />
            Send e-mail når saldo er 0 kr. eller under
          </label>
          <label>
            <input type="checkbox" id="notify-ten-checkbox" />
            Send e-mail når saldo er 10 kr. eller under
          </label>
        </div>
        <button id="save-notify-btn">Gem e-mail-beskeder</button>
        <p id="notify-feedback"></p>
      </div>

      <button id="logout-btn">Log ud</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const FUNCTION_URL =
        "https://jbknjgbpghrbrstqwoxj.functions.supabase.co/get-parent-view";
      const SAVE_NOTIFY_URL =
        "https://jbknjgbpghrbrstqwoxj.functions.supabase.co/save-parent-notification";

      let currentChildId = null;

      const loginView = document.getElementById("login-view");
      const resultsView = document.getElementById("results-view");
      const loginForm = document.getElementById("parent-login-form");
      const loginBtn = document.getElementById("login-btn");
      const loginError = document.getElementById("login-error");
      const logoutBtn = document.getElementById("logout-btn");

      const parentEmailInput = document.getElementById("parent-email-input");
      const notifyZeroCheckbox = document.getElementById("notify-zero-checkbox");
      const notifyTenCheckbox = document.getElementById("notify-ten-checkbox");
      const saveNotifyBtn = document.getElementById("save-notify-btn");
      const notifyFeedback = document.getElementById("notify-feedback");

      const balanceDot = document.getElementById("balance-dot");
      const balanceStatusLabel = document.getElementById("balance-status-label");
      const balanceDisplay = document.getElementById("balance-display");

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginBtn.disabled = true;
        loginBtn.textContent = "Logger ind...";
        loginError.style.display = "none";

        const nameInput = document.getElementById("child-name-input").value.trim();
        const parentPin = document.getElementById("parent-pin-input").value.trim();

        try {
          const res = await fetch(FUNCTION_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name_input: nameInput,
              parent_pin: parentPin,
            }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            console.log("Fejl fra server:", data);

            if (data.error_code === "MULTIPLE_MATCHES") {
              loginError.textContent =
                "Der er flere børn med dette navn. Skriv barnets fulde navn.";
            } else if (data.error) {
              loginError.textContent = data.error;
            } else {
              loginError.textContent = "Forkert navn eller PIN-kode. Prøv igen.";
            }

            loginError.style.display = "block";
            return;
          }

          displayResults(data);

        } catch (err) {
          console.error("Fetch-fejl:", err);
          loginError.textContent = "Der opstod en netværksfejl.";
          loginError.style.display = "block";
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "Se saldo og historik";
        }
      });

      logoutBtn.addEventListener("click", () => {
        loginView.style.display = "block";
        resultsView.style.display = "none";
        loginForm.reset();
        loginError.style.display = "none";
        notifyFeedback.textContent = "";
        parentEmailInput.value = "";
        notifyZeroCheckbox.checked = false;
        notifyTenCheckbox.checked = false;
      });

      saveNotifyBtn.addEventListener("click", async () => {
        if (!currentChildId) {
          notifyFeedback.textContent = "Fejl: Ingen barnedata indlæst.";
          notifyFeedback.style.color = "#dc3545";
          return;
        }

        const email = parentEmailInput.value.trim();
        const notifyAtZero = notifyZeroCheckbox.checked;
        const notifyAtTen = notifyTenCheckbox.checked;

        if (!email) {
          notifyFeedback.textContent = "Indtast venligst en e-mailadresse.";
          notifyFeedback.style.color = "#dc3545";
          return;
        }

        saveNotifyBtn.disabled = true;
        saveNotifyBtn.textContent = "Gemmer...";
        notifyFeedback.textContent = "";

        try {
          const res = await fetch(SAVE_NOTIFY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: currentChildId,
              email: email,
              notify_at_zero: notifyAtZero,
              notify_at_ten: notifyAtTen,
            }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok || data.success === false) {
            notifyFeedback.textContent = data.error || "Fejl: Kunne ikke gemme.";
            notifyFeedback.style.color = "#dc3545";
            return;
          }

          notifyFeedback.textContent = "Dine indstillinger er gemt!";
          notifyFeedback.style.color = "#28a745";
        } catch (err) {
          console.error("Fejl ved gemning af notifikationer:", err);
          notifyFeedback.textContent = "Fejl: Kunne ikke gemme. Prøv igen.";
          notifyFeedback.style.color = "#dc3545";
        } finally {
          saveNotifyBtn.disabled = false;
          saveNotifyBtn.textContent = "Gem e-mail-beskeder";
        }
      });

      function updateBalanceStatus(balance) {
        const b = Number(balance) || 0;

        balanceDot.classList.remove("low", "negative");
        if (b <= 0) {
          balanceDot.classList.add("negative");
          balanceStatusLabel.textContent = "Saldo under 0 kr.";
        } else if (b <= 10) {
          balanceDot.classList.add("low");
          balanceStatusLabel.textContent = "Lav saldo";
        } else {
          balanceStatusLabel.textContent = "OK saldo";
        }
      }

      function displayResults(data) {
        currentChildId = data.child_id || null;

        document.getElementById("child-name-display").textContent =
          data.child_name || "";
        const balance =
          typeof data.balance === "number"
            ? data.balance
            : Number(data.balance || 0);
        balanceDisplay.textContent = balance.toFixed(2) + " kr";
        updateBalanceStatus(balance);

        const historyList = document.getElementById("history-list");
        historyList.innerHTML = "";

        if (!data.history || data.history.length === 0) {
          const li = document.createElement("li");
          li.textContent = "Ingen historik fundet.";
          li.style.fontSize = "14px";
          li.style.color = "#6b7280";
          li.style.padding = "6px 2px";
          historyList.appendChild(li);
        } else {
          data.history.forEach((item) => {
            const li = document.createElement("li");
            li.className = "history-item";

            const date = new Date(item.date).toLocaleDateString("da-DK", {
              day: "2-digit",
              month: "short",
              year: "numeric",
            });

            const main = document.createElement("div");
            main.className = "history-main";

            const descRow = document.createElement("div");
            descRow.className = "history-description-row";

            const pill = document.createElement("span");
            pill.className = "history-pill " + item.type;

            const descText = document.createElement("span");
            descText.textContent = item.description;

            descRow.appendChild(pill);
            descRow.appendChild(descText);

            const dateEl = document.createElement("div");
            dateEl.className = "history-date";
            dateEl.textContent = date;

            main.appendChild(descRow);
            main.appendChild(dateEl);

            const amountEl = document.createElement("div");
            amountEl.className = "history-amount";

            const amountNumber =
              typeof item.amount === "number"
                ? item.amount
                : Number(item.amount || 0);

            if (amountNumber !== 0) {
              const sign = item.type === "SALE" ? "-" : "+";
              amountEl.textContent = `${sign}${amountNumber.toFixed(2)} kr.`;
              if (item.type === "SALE") {
                amountEl.classList.add("sale");
              } else if (item.type === "DEPOSIT") {
                amountEl.classList.add("deposit");
              }
            } else {
              amountEl.textContent = "";
            }

            li.appendChild(main);
            li.appendChild(amountEl);
            historyList.appendChild(li);
          });
        }

        // Auto-load notification settings
        notifyFeedback.textContent = "";
        if (data.notification_settings) {
          const ns = data.notification_settings;
          parentEmailInput.value = ns.email || "";
          notifyZeroCheckbox.checked = !!ns.notify_at_zero;
          notifyTenCheckbox.checked = !!ns.notify_at_ten;
          if (ns.email) {
            notifyFeedback.textContent = "Tidligere indstillinger er indlæst.";
            notifyFeedback.style.color = "#28a745";
          }
        } else {
          parentEmailInput.value = "";
          notifyZeroCheckbox.checked = false;
          notifyTenCheckbox.checked = false;
        }

        loginView.style.display = "none";
        resultsView.style.display = "block";
      }
    });
  </script>
</body>
</html>
