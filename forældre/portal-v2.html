</div>

<script>
  // ─── Supabase Config ───
  const SUPABASE_URL = "https://jbknjgbpghrbrstqwoxj.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impia25qZ2JwZ2hyYnJzdHF3b3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MjIwNjMsImV4cCI6MjA3ODE5ODA2M30.ZMlxQyzmXuy43EcKIN6-eO8pJZs2F6kfDw_cfaks9qQ";

  // Safety check: don't point to localhost in production
  if (SUPABASE_URL.includes('127.0.0.1') && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
    throw new Error('Supabase URL must not point to localhost in production');
  }

  // Check for recovery token in hash before createClient processes it
  let __pendingPasswordRecovery = false;
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  if (hashParams.get('type') === 'recovery') {
    __pendingPasswordRecovery = true;
  }

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      storageKey: 'flango-parent-auth',
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      flowType: 'implicit',
    }
  });
  // Expose as global for portal-v2-api.js and portal-v2.js
  window.portalSupabase = supabaseClient;

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === "PASSWORD_RECOVERY") {
      __pendingPasswordRecovery = true;
    }
  });

  // ─── Version detection: if v1, redirect ───
  // If the URL has ?v=1 or the user explicitly wants v1, redirect
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('v') === '1') {
    window.location.href = 'index.html';
  }
</script>

<script src="js/portal-v2-api.js"></script>

<script>
// Cookie-banner — portalen bruger lyst tema
(function() {
    var KEY = 'flango_cookie_banner_dismissed';
    if (localStorage.getItem(KEY)) return;
    var banner = document.createElement('div');
    banner.id = 'flango-cookie-banner';
    banner.innerHTML = '<span style="flex:1;line-height:1.4">🍪 Flango bruger kun n\u00f8dvendige cookies til at holde dig logget ind. Vi bruger ikke tracking- eller markedsf\u00f8ringscookies.</span><button id="cookie-banner-dismiss" style="flex-shrink:0;background:#f3f4f6;border:1px solid #d1d5db;color:#374151;font-size:0.8rem;padding:0.35rem 0.9rem;border-radius:6px;cursor:pointer;white-space:nowrap">Forst\u00e5et</button>';
    var style = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.75rem 1.25rem;background:rgba(255,255,255,0.97);border-top:1px solid #e5e7eb;font-family:Arial,sans-serif;font-size:0.8rem;color:#374151;box-shadow:0 -2px 12px rgba(0,0,0,0.08)';
    banner.setAttribute('style', style);
    document.body.appendChild(banner);
    document.getElementById('cookie-banner-dismiss').onclick = function() {
        localStorage.setItem(KEY, '1');
        banner.remove();
    };
})();
</script>
